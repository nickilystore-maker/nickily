<!DOCTYPE html>
<html>
<head>
    <title>Nickily</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;900&display=swap" rel="stylesheet">
</head>

<body class="home-body">

<!-- HERO PRINCIPAL -->

<section class="hero">

    <div class="overlay"></div>

    <div class="contenido-hero fade-in">
        <h1 class="marca">NICKILY</h1>

        <p class="frase-impacto">
            Diseñado por ti. <br>
            Vestido para destacar.
        </p>

        <p class="precio-home">$90.000</p>

        <a href="personalizar.html" class="btn-home">
            Personalizar ahora
        </a>

        <p class="beneficios">
            Envíos a todo Colombia • Stock limitado semanal
        </p>
    </div>

</section>


<!-- VIDEO 360 -->

<section class="video-section">

    <h2>Vista 360°</h2>

    <video controls autoplay muted loop class="video-360">
        <source src="video360.mp4" type="video/mp4">
        Tu navegador no soporta video.
    </video>

</section>


<!-- GALERÍA DE PERSONALIZADOS -->

<section class="galeria">

    <h2>Algunos personalizados</h2>

    <div class="grid-galeria">

        <img src="personalizado1.jpg">
        <img src="personalizado2.jpg">
        <img src="personalizado3.jpg">
        <img src="personalizado4.jpg">

    </div>

</section>


<!-- CTA FINAL -->

<section class="cta-final">

    <h2>Haz el tuyo hoy</h2>

    <a href="personalizar.html" class="btn-home grande">
        Crear mi buzo
    </a>

</section>

</body>
</html>
