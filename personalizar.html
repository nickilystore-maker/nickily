<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personalizar | Nickily</title>

</head>
<link rel="stylesheet" href="style.css?v=21">
<body>

<div class="personalizar-title">
  <h2>Elige el color de tu buso</h2>
  <p>Haz clic en un color para personalizarlo.</p>
</div>

<p class="social-proof">
+187 clientes felices este mes
</p>
  
<div class="container">

<div class="product-image">
 <img id="imagenProducto" src="">
</div>

<div class="form-box">

<label>Color</label>
<div class="color-options" id="colorOptions">

<div class="color-circle blanco" data-color="blanco" title="Blanco"></div>
<div class="color-circle rosa" data-color="rosa" title="Rosa"></div>
<div class="color-circle cafe" data-color="cafe" title="Café"></div>
<div class="color-circle negro" data-color="negro" title="Negro"></div>
<div class="color-circle rojo" data-color="rojo" title="Rojo"></div>
<div class="color-circle azul" data-color="azul" title="Azul"></div>
<div class="color-circle verde" data-color="verde" title="Verde"></div>
<div class="color-circle mostaza" data-color="mostaza" title="Mostaza"></div>
<div class="color-circle gris" data-color="gris" title="Gris"></div>
<div class="color-circle morado" data-color="morado" title="Morado"></div>

</div>

<input type="hidden" id="colorSelect" value="negro">

 <label>Talla</label>
 <select id="talla">
  <option value="S">S</option>
  <option value="M">M</option>
  <option value="L">L</option>
  <option value="XL">XL</option>
 </select>

 <label>¿Qué anime o diseño quieres?</label>
 <textarea id="diseno" placeholder="Ej: Naruto, One Piece, Demon Slayer..."></textarea>

 <button class="btn big-cta" onclick="enviarWhatsApp()">
🔥 Quiero mi buso personalizado
</button>

<p style="margin-top:15px; font-size:14px; opacity:0.7;">
Producción personalizada • Hecho bajo pedido • Envíos a todo Colombia 🇨🇴
</p>
  
</div>
</div>

<script>

const params = new URLSearchParams(window.location.search);
const colorURL = params.get('color');

const imagen = document.getElementById('imagenProducto');
const colorInput = document.getElementById('colorSelect');
const circles = document.querySelectorAll('.color-circle');

/* FUNCION PARA CAMBIAR COLOR */

function cambiarColor(color){

  imagen.style.transform = "scale(0.95)";
  imagen.style.opacity = 0;

  setTimeout(()=>{
    imagen.src = "images/producto/" + color + ".jpg";
    imagen.style.opacity = 1;
    imagen.style.transform = "scale(1)";
  },200);

  colorInput.value = color;

  circles.forEach(c => c.classList.remove('active'));

  const activo = document.querySelector(`[data-color="${color}"]`);
  if(activo){
    activo.classList.add('active');
  }
}

/* CLICK EN CIRCULOS */

circles.forEach(circle=>{
  circle.addEventListener('click', function(){
    const color = this.getAttribute('data-color');
    cambiarColor(color);
  });
});

/* SI VIENE COLOR DESDE URL */

if(colorURL){
  cambiarColor(colorURL);
}else{
  cambiarColor("negro");
}

/* ENVÍO WHATSAPP */

function enviarWhatsApp(){

 const colorElegido = colorInput.value;
 const talla = document.getElementById("talla").value;
 const diseno = document.getElementById("diseno").value.trim();

 if(diseno === ""){
  alert("Escribe el diseño o anime que quieres");
  return;
 }

 const mensaje = `Hola Nickily 👋
Quiero personalizar un buso:

Color: ${colorElegido}
Talla: ${talla}
Diseño: ${diseno}`;

 const numero = "573053471863";
 const url = `https://wa.me/${numero}?text=${encodeURIComponent(mensaje)}`;

 window.open(url, "_blank");
}

</script>    


</body>
</html>
