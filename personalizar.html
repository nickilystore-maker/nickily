<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personalizar | Nickily</title>

</head>
<link rel="stylesheet" href="style.css?v=21">
<body>

<div class="personalizar-title">
  <h1>Crea tu diseño único</h1>
  <p>Elige el color, la talla y dinos el anime que quieres 🔥</p>
</div>

<div class="container">

<div class="product-image">
 <img id="imagenProducto" src="">
</div>

<div class="form-box">

<label>Color</label>
<div class="color-options" id="colorOptions">

  <div class="color-circle blanco" data-color="blanco"></div>
  <div class="color-circle rosa" data-color="rosa"></div>
  <div class="color-circle cafe" data-color="cafe"></div>
  <div class="color-circle negro" data-color="negro"></div>
  <div class="color-circle rojo" data-color="rojo"></div>
  <div class="color-circle azul" data-color="azul"></div>
  <div class="color-circle verde" data-color="verde"></div>
  <div class="color-circle mostaza" data-color="mostaza"></div>
  <div class="color-circle gris" data-color="gris"></div>
  <div class="color-circle morado" data-color="morado"></div>

</div>

<input type="hidden" id="colorSelect" value="negro">

 <label>Talla</label>
 <select id="talla">
  <option value="S">S</option>
  <option value="M">M</option>
  <option value="L">L</option>
  <option value="XL">XL</option>
 </select>

 <label>¿Qué anime o diseño quieres?</label>
 <textarea id="diseno" placeholder="Ej: Naruto, One Piece, Demon Slayer..."></textarea>

 <button class="btn" onclick="enviarWhatsApp()">Enviar a WhatsApp</button>

</div>
</div>

<script>

const params = new URLSearchParams(window.location.search);
const colorURL = params.get('color');

const imagen = document.getElementById('imagenProducto');
const selectColor = document.getElementById('colorSelect');

if(colorURL){
 imagen.src = "images/producto/" + colorURL + ".jpg";
 selectColor.value = colorURL;
}else{
 imagen.src = "images/producto/negro.jpg";
}

/* Cambio de imagen */
selectColor.addEventListener("change", function(){
 imagen.style.opacity = 0;

 setTimeout(()=>{
  imagen.src = "images/producto/" + this.value + ".jpg";
  imagen.style.opacity = 1;
 },200);
});

function enviarWhatsApp(){

 const colorElegido = selectColor.value;
 const talla = document.getElementById("talla").value;
 const diseno = document.getElementById("diseno").value.trim();

 if(diseno === ""){
  alert("Escribe el diseño o anime que quieres");
  return;
 }

 const mensaje = `Hola Nickily 👋
Quiero personalizar un buso:

Color: ${colorElegido}
Talla: ${talla}
Diseño: ${diseno}`;

 const numero = "573053471863";
 const url = `https://wa.me/${numero}?text=${encodeURIComponent(mensaje)}`;

 window.open(url, "_blank");
}

</script>

</body>
</html>
