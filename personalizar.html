<!DOCTYPE html>
<html>
<head>
    <title>Nickily - Personaliza</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body class="personalizar-body">

<h1 class="titulo">Nickily</h1>
<p class="frase">Diseña tu identidad</p>

<img id="imagenProducto" src="buzo-negro.jpg" class="producto-img">

<div class="bloque">
    <label>Talla</label>
    <select id="talla">
        <option value="S">S</option>
        <option value="M">M</option>
        <option value="L">L</option>
    </select>
</div>

<div class="bloque">
    <label>Color</label>
    <select id="color" onchange="cambiarImagen()">
        <option value="negro">Negro</option>
        <option value="blanco">Blanco</option>
        <option value="beige">Beige</option>
        <option value="gris">Gris</option>
    </select>
</div>

<p class="precio">$90.000</p>

<button onclick="enviarPedido()" class="btn">
    Solicitar pieza
</button>

<script>
function cambiarImagen() {
    var color = document.getElementById("color").value;
    var imagen = document.getElementById("imagenProducto");

    imagen.src = "buzo-" + color + ".jpg";
}

function enviarPedido() {
    var talla = document.getElementById("talla").value;
    var color = document.getElementById("color").value;

    var mensaje = "Hola Nickily, quiero mi buzo personalizado de $90.000.%0A"
                + "Talla: " + talla + "%0A"
                + "Color: " + color;

    window.location.href = "https://wa.me/573053471863?text=" + mensaje;
}
</script>

</body>
</html>
