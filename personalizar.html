<!DOCTYPE html>
<html>
<head>
    <title>Nickily - Personaliza</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body style="background:black; color:white; text-align:center; font-family:Arial;">

<h1 style="font-size:40px; margin-top:40px;">Diseña tu Identidad</h1>

<p style="opacity:0.7; margin-bottom:40px;">
Cada pieza es única. Tú eliges cómo empieza.
</p>

<img src="https://via.placeholder.com/300x300"
     style="width:300px; border-radius:10px; margin-bottom:30px;">

<h2>Talla</h2>
<select id="talla" class="select">
    <option value="S">S</option>
    <option value="M">M</option>
    <option value="L">L</option>
</select>

<h2 style="margin-top:30px;">Color Base</h2>
<select id="color" class="select">
    <option value="Negro">Negro</option>
    <option value="Blanco">Blanco</option>
    <option value="Beige">Beige</option>
    <option value="Gris">Gris</option>
</select>

<p style="font-size:22px; font-weight:bold; margin-top:40px;">
$90.000
</p>

<button onclick="enviarPedido()" class="btn">
    Personalizar ahora
</button>

<script>
function enviarPedido() {
    var talla = document.getElementById("talla").value;
    var color = document.getElementById("color").value;

    var mensaje = "Hola Nickily, quiero mi buzo personalizado de $90.000.%0A"
                + "Talla: " + talla + "%0A"
                + "Color: " + color;

    window.location.href = "https://wa.me/573053471863?text=" + mensaje;
}
</script>

</body>
</html>
