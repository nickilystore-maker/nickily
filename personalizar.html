<!DOCTYPE html>
<html>
<head>
    <title>Nickily - Personaliza</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body class="personalizar-body">

<h1 class="titulo">Diseña tu Identidad</h1>

<p class="subtitulo">
Cada pieza es única. No es solo un buzo, es tu versión.
</p>

<img src="TU-IMAGEN-REAL-AQUI.jpg" class="producto-img">

<div class="selector">
    <h2>Talla</h2>
    <select id="talla">
        <option value="S">S</option>
        <option value="M">M</option>
        <option value="L">L</option>
    </select>
</div>

<div class="selector">
    <h2>Color Base</h2>
    <select id="color">
        <option value="Negro">Negro</option>
        <option value="Blanco">Blanco</option>
        <option value="Beige">Beige</option>
        <option value="Gris">Gris</option>
    </select>
</div>

<p class="precio">$90.000</p>

<button onclick="enviarPedido()" class="btn">
    Personalizar ahora
</button>

<script>
function enviarPedido() {
    var talla = document.getElementById("talla").value;
    var color = document.getElementById("color").value;

    var mensaje = "Hola Nickily, quiero mi buzo personalizado de $90.000.%0A"
                + "Talla: " + talla + "%0A"
                + "Color: " + color;

    window.location.href = "https://wa.me/573053471863?text=" + mensaje;
}
</script>

</body>
</html>
