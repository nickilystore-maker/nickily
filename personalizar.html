<!DOCTYPE html>
<html>
<head>
    <title>Nickily - Personaliza tu Buzo</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;900&display=swap" rel="stylesheet">
</head>

<body class="home-body">

<section class="personalizar-hero">

    <h1 class="marca">Dale forma a tu estilo</h1>
    <p class="frase-impacto">Elige tu talla y color</p>

    <img id="imagenProducto" src="buzo-negro.jpg" class="producto-img">

    <div class="bloque-personalizar">
        <label>Talla</label>
        <select id="talla">
            <option value="S">S</option>
            <option value="M">M</option>
            <option value="L">L</option>
        </select>
    </div>

    <div class="bloque-personalizar">
        <label>Color</label>
        <select id="color" onchange="cambiarImagen()">
            <option value="negro">Negro</option>
            <option value="blanco">Blanco</option>
            <option value="rojo">Rojo</option>
            <option value="gris">Gris</option>
        </select>
    </div>

    <p class="precio-home">$90.000</p>
    <p class="beneficios">Envíos a todo Colombia • Pago contra entrega</p>

    <button onclick="enviarPedido()" class="btn-home">
        Confirmar mi pedido
    </button>

</section>

<script>
function cambiarImagen() {
    var color = document.getElementById("color").value;
    var imagen = document.getElementById("imagenProducto");
    imagen.src = "buzo-" + color + ".jpg";
}

function enviarPedido() {
    var talla = document.getElementById("talla").value;
    var color = document.getElementById("color").value;

    var mensaje = "Hola Nickily, quiero mi buzo personalizado de $90.000.%0A"
                + "Talla: " + talla + "%0A"
                + "Color: " + color;

    window.location.href = "https://wa.me/573053471863?text=" + mensaje;
}
</script>

</body>
</html>
